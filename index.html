<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0d192b">

  <title>Frontend Mentor | NFT preview card component</title>

  <link rel="icon" type="image/png" sizes="32x32" href="./favicon.png">
  <link rel="stylesheet" href="./main.css">
</head>

<body class="site">

  <main>
    <h1 class="visually-hidden">NFT preview card</h1>

    <article class="card">
      <a href="#" class="card-media">
        <img src="./assets/images/image-equilibrium.jpg" alt="Equilibrium #3429 artwork">
      </a>

      <h2 class="card-title">
        <a href="#">Equilibrium #3429</a>
      </h2>

      <p class="card-description">Our Equilibrium collection promotes balance and calm.</p>

      <ul class="card-meta">
        <li class="card-meta-item">
          <img src="./assets/icons/icon-ethereum.svg" alt="">
          <span>0.041 ETH</span>
        </li>
        <li class="card-meta-item">
          <img src="./assets/icons/icon-clock.svg" alt="">
          <span>3 days left</span>
        </li>
      </ul>


      <footer class="card-footer">
        <img src="./assets/images/image-avatar.png" alt="Jules Wyvern" class="card-avatar">
        <p>Creation of <a href="#" class="card-author">Jules Wyvern</a></p>
      </footer>
    </article>
  </main>

  <footer class="site-footer">
    <small class="attribution">Challenge by <a href="https://www.frontendmentor.io/challenges" target="_blank"
        rel="noopener noreferrer" class="attribution-link">Frontend Mentor</a> &ndash; Coded by <a
        href="https://www.frontendmentor.io/profile/vimpdev" target="_blank" rel="noopener noreferrer"
        class="attribution-link">VIMP</a>
    </small>
  </footer>
</body>

</html>
