    content="Solution to the NFT preview card component challenge from Frontend Mentor built with semantic HTML, CSS layers (@layer), and modern CSS practices with accessible focus states.">

  <meta property="og:site_name" content="VIMP Frontend Mentor Solutions">
  <meta property="og:title" content="NFT Preview Card Component Solution &ndash; Frontend Mentor">
  <meta property="og:description"
    content="Solution to the NFT preview card component challenge from Frontend Mentor built with semantic HTML, CSS layers (@layer), and modern CSS practices with accessible focus states.">
  <meta property="og:image" content="https://vimpdev.github.io/fem-12-nft-preview-card-component/docs/preview-og.png">

    content="Desktop view of the NFT preview card component showing hover and focus states on interactive elements.">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:url" content="https://vimpdev.github.io/fem-12-nft-preview-card-component/">

  <link rel="stylesheet" href="./main.css">

<body class="site">

  <main>
    <h1 class="visually-hidden">NFT preview card</h1>

    <article class="card">
      <a href="#" class="card-media">
        <img src="./assets/images/image-equilibrium.jpg" alt="Equilibrium #3429 artwork">
      </a>

      <h2 class="card-title">
        <a href="#">Equilibrium #3429</a>
      </h2>

      <p class="card-description">Our Equilibrium collection promotes balance and calm.</p>

      <ul class="card-meta">
        <li class="card-meta-item">
          <img src="./assets/icons/icon-ethereum.svg" alt="">
          <span>0.041 ETH</span>
        </li>
        <li class="card-meta-item">
          <img src="./assets/icons/icon-clock.svg" alt="">
          <span>3 days left</span>
        </li>
      </ul>


      <footer class="card-footer">
        <img src="./assets/images/image-avatar.png" alt="Jules Wyvern" class="card-avatar">
        <p>Creation of <a href="#" class="card-author">Jules Wyvern</a></p>
      </footer>
    </article>
  </main>

  <footer class="site-footer">
    <small class="attribution">Challenge by <a href="https://www.frontendmentor.io/challenges" target="_blank"
        rel="noopener noreferrer" class="attribution-link">Frontend Mentor</a> &ndash; Coded by <a
        href="https://www.frontendmentor.io/profile/vimpdev" target="_blank" rel="noopener noreferrer"
        class="attribution-link">VIMP</a>
    </small>
  </footer>
</body>

</html>
